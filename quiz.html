  <section class="quiz-section">
    <div class="container">
      <h2>Global Hunger Quiz</h2>
      <p>Answer the following to test your awareness.</p>

      <form class="quiz-form">
        <div class="question">
          <h3>1. How many people globally face hunger?</h3>
          <label><input type="radio" name="q1"> 200 million</label><br>
          <label><input type="radio" name="q1"> 500 million</label><br>
          <label><input type="radio" name="q1"> Over 800 million</label>
        </div>

        <div class="question">
          <h3>2. What’s a major cause of hunger?</h3>
          <label><input type="radio" name="q2"> Climate change</label><br>
          <label><input type="radio" name="q2"> Food shortage only</label><br>
          <label><input type="radio" name="q2"> Laziness</label>
        </div>

        <button type="submit">Submit Answers</button>
      </form>
    </div>
  </section>
